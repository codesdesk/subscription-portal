name = "Invoice Subscription Ordering"
client_id = "replace-with-shopify-client-id"
application_url = "https://example.ngrok-free.app"
embedded = true

[access_scopes]
scopes = "read_customers,write_customers,read_products,read_orders,write_orders,read_draft_orders,write_draft_orders,read_payment_terms,write_payment_terms"

[auth]
redirect_urls = [
  "https://example.ngrok-free.app/auth/callback",
  "https://example.ngrok-free.app/auth/shopify/callback",
  "https://example.ngrok-free.app/api/auth/callback"
]

[webhooks]
api_version = "2026-07"

[app_proxy]
url = "https://example.ngrok-free.app"
subpath = "subscription-portal"
prefix = "apps"
